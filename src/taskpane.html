<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setzkasten Markdown</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="converters.js"></script>
<style>
  :root {
    --ink: #26282b;
    --ink-soft: #303338;
    --line: #e3e5e8;
    --dim: #84898f;
    --accent: #61a60e;       /* ALHO-Gruen */
    --accent-deep: #4a7f0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: #fff;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 14px;
    background: var(--ink);
    color: #fff;
  }
  header .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  header .mark {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 4px;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
  }
  .lang { display: flex; border: 1px solid #4a4e54; border-radius: 6px; overflow: hidden; }
  .lang button {
    border: none; background: transparent; color: #aab0b7;
    font-size: 10px; font-weight: 700; letter-spacing: .04em;
    padding: 4px 7px; cursor: pointer;
  }
  .lang button.active { background: var(--accent); color: #fff; }

  main { padding: 14px; display: flex; flex-direction: column; gap: 18px; }
  section h2 {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--dim); margin-bottom: 8px;
  }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  button.action {
    appearance: none;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  button.action:hover { border-color: var(--accent); color: var(--accent-deep); }
  button.action.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.action.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  button.action:disabled { opacity: .5; cursor: default; }
  textarea {
    width: 100%;
    min-height: 110px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: Consolas, 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.55;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 11px; color: var(--dim); margin-top: 6px; line-height: 1.45; }
  #status {
    position: fixed;
    left: 14px; right: 14px; bottom: 12px;
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    border-left: 3px solid var(--accent);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  #status.show { opacity: 1; }
  input[type="file"] { display: none; }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="mark">M↓</span><span>Setzkasten</span></div>
  <div class="lang">
    <button data-lang="de" class="active">DE</button>
    <button data-lang="fr">FR</button>
    <button data-lang="en">EN</button>
  </div>
</header>

<main>
  <section>
    <h2 id="hImport">Markdown importieren</h2>
    <div class="row">
      <button class="action primary" id="btnImportFile"></button>
    </div>
    <p class="hint" id="hintImport"></p>
    <input type="file" id="fileInput" accept=".md,.markdown,.txt">
  </section>

  <section>
    <h2 id="hPaste"></h2>
    <textarea id="mdIn" spellcheck="false"></textarea>
    <div class="row" style="margin-top:8px">
      <button class="action primary" id="btnInsert"></button>
      <button class="action" id="btnClearIn"></button>
    </div>
    <p class="hint" id="hintPaste"></p>
  </section>

  <section>
    <h2 id="hExport"></h2>
    <div class="row">
      <button class="action" id="btnSelToMd"></button>
      <button class="action" id="btnDocToMd"></button>
    </div>
    <textarea id="mdOut" spellcheck="false" readonly style="margin-top:8px"></textarea>
    <div class="row" style="margin-top:8px">
      <button class="action primary" id="btnCopyOut"></button>
      <button class="action" id="btnDownload"></button>
    </div>
    <p class="hint" id="hintExport"></p>
  </section>
</main>

<div id="status"></div>

<script>
/* ════════ Mehrsprachigkeit ════════ */
const I18N = {
  de: {
    hImport: 'Markdown importieren', importFile: '.md-Datei einfügen …',
    hintImport: 'Wandelt die Datei in formatierten Word-Text um und fügt sie an der Cursorposition ein.',
    hPaste: 'Markdown einfügen (Copy & Paste)', insert: 'Formatiert einfügen', clear: 'Leeren',
    phIn: 'Markdown hier einfügen (Strg+V) …',
    hintPaste: 'Hinweis: Office erlaubt Add-ins kein Abfangen von Strg+V im Dokument — der Weg führt über dieses Feld.',
    hExport: 'Als Markdown exportieren', selToMd: 'Markierung → Markdown', docToMd: 'Ganzes Dokument → Markdown',
    copy: 'Kopieren', download: '.md herunterladen', phOut: 'Ergebnis erscheint hier …',
    hintExport: 'Markdown-fremde Word-Elemente (Spalten, Textfelder, Kommentare) entfallen beim Export.',
    okInsert: 'Eingefügt', okImport: 'Datei eingefügt: ', okCopy: 'Markdown kopiert',
    okExport: 'Konvertiert', errEmpty: 'Kein Markdown-Text vorhanden', errSel: 'Keine Markierung gefunden',
    errOffice: 'Word-Aktion fehlgeschlagen: ', errRead: 'Datei konnte nicht gelesen werden',
    errCopy: 'Kopieren fehlgeschlagen — Text bitte manuell markieren', tocTitle: 'Inhalt'
  },
  fr: {
    hImport: 'Importer du Markdown', importFile: 'Insérer un fichier .md …',
    hintImport: 'Convertit le fichier en texte Word mis en forme et l’insère à la position du curseur.',
    hPaste: 'Coller du Markdown', insert: 'Insérer mis en forme', clear: 'Effacer',
    phIn: 'Collez le Markdown ici (Ctrl+V) …',
    hintPaste: 'Remarque : Office n’autorise pas les compléments à intercepter Ctrl+V dans le document — passez par ce champ.',
    hExport: 'Exporter en Markdown', selToMd: 'Sélection → Markdown', docToMd: 'Document entier → Markdown',
    copy: 'Copier', download: 'Télécharger .md', phOut: 'Le résultat apparaît ici …',
    hintExport: 'Les éléments Word sans équivalent Markdown (colonnes, zones de texte, commentaires) sont omis.',
    okInsert: 'Inséré', okImport: 'Fichier inséré : ', okCopy: 'Markdown copié',
    okExport: 'Converti', errEmpty: 'Aucun texte Markdown', errSel: 'Aucune sélection trouvée',
    errOffice: 'Échec de l’action Word : ', errRead: 'Impossible de lire le fichier',
    errCopy: 'Échec de la copie — veuillez sélectionner le texte manuellement', tocTitle: 'Sommaire'
  },
  en: {
    hImport: 'Import Markdown', importFile: 'Insert .md file …',
    hintImport: 'Converts the file to formatted Word text and inserts it at the cursor position.',
    hPaste: 'Paste Markdown', insert: 'Insert formatted', clear: 'Clear',
    phIn: 'Paste Markdown here (Ctrl+V) …',
    hintPaste: 'Note: Office does not let add-ins intercept Ctrl+V in the document — use this field instead.',
    hExport: 'Export as Markdown', selToMd: 'Selection → Markdown', docToMd: 'Whole document → Markdown',
    copy: 'Copy', download: 'Download .md', phOut: 'Result appears here …',
    hintExport: 'Word elements with no Markdown equivalent (columns, text boxes, comments) are omitted on export.',
    okInsert: 'Inserted', okImport: 'File inserted: ', okCopy: 'Markdown copied',
    okExport: 'Converted', errEmpty: 'No Markdown text', errSel: 'No selection found',
    errOffice: 'Word action failed: ', errRead: 'Could not read the file',
    errCopy: 'Copy failed — please select the text manually', tocTitle: 'Contents'
  }
};
const LANG_KEY = 'setzkasten-addin-lang';
function loadLang() {
  try { const s = localStorage.getItem(LANG_KEY); if (s && I18N[s]) return s; } catch (_) {}
  return null;
}
function saveLang(l) { try { localStorage.setItem(LANG_KEY, l); } catch (_) {} }

let lang = loadLang() || (navigator.language || 'de').slice(0, 2);
if (!I18N[lang]) lang = 'de';
const t = k => I18N[lang][k];

function applyLang() {
  const d = I18N[lang];
  document.documentElement.lang = lang;
  document.getElementById('hImport').textContent = d.hImport;
  document.getElementById('btnImportFile').textContent = d.importFile;
  document.getElementById('hintImport').textContent = d.hintImport;
  document.getElementById('hPaste').textContent = d.hPaste;
  document.getElementById('btnInsert').textContent = d.insert;
  document.getElementById('btnClearIn').textContent = d.clear;
  document.getElementById('mdIn').placeholder = d.phIn;
  document.getElementById('hintPaste').textContent = d.hintPaste;
  document.getElementById('hExport').textContent = d.hExport;
  document.getElementById('btnSelToMd').textContent = d.selToMd;
  document.getElementById('btnDocToMd').textContent = d.docToMd;
  document.getElementById('btnCopyOut').textContent = d.copy;
  document.getElementById('btnDownload').textContent = d.download;
  document.getElementById('mdOut').placeholder = d.phOut;
  document.getElementById('hintExport').textContent = d.hintExport;
  document.querySelectorAll('.lang button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang));
}
document.querySelectorAll('.lang button').forEach(b =>
  b.addEventListener('click', () => { lang = b.dataset.lang; saveLang(lang); applyLang(); }));

function status(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(status._t);
  status._t = setTimeout(() => el.classList.remove('show'), 2600);
}

/* Konverter siehe converters.js (vor diesem Script eingebunden) */

/* ════════ Mermaid (CDN-Lazy-Load) & TOC-Aufbereitung ════════ */
let mermaidLib = null, mermaidSeq = 0;
function ensureMermaid() {
  if (window.mermaid) return Promise.resolve(true);
  if (mermaidLib) return mermaidLib;
  mermaidLib = new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js';
    s.onload = () => { try { window.mermaid.initialize({ startOnLoad: false, theme: 'neutral' }); resolve(true); } catch (_) { resolve(false); } };
    s.onerror = () => { mermaidLib = null; resolve(false); };
    document.head.appendChild(s);
  });
  return mermaidLib;
}
function decodeB64(b64) {
  try { return decodeURIComponent(escape(atob(b64))); } catch (_) { return ''; }
}
// SVG (aus mermaid.render) zu PNG-Data-URL rastern
function svgToPngDataUrl(svg) {
  return new Promise(resolve => {
    try {
      const m = svg.match(/viewBox="[\d.\s]*?([\d.]+)\s+([\d.]+)"/);
      const w = m ? Math.ceil(+m[1]) : 800, h = m ? Math.ceil(+m[2]) : 600;
      const scale = 2; // schärfer für Druck
      const img = new Image();
      const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = w * scale; c.height = h * scale;
        const cx = c.getContext('2d');
        cx.fillStyle = '#fff'; cx.fillRect(0, 0, c.width, c.height);
        cx.drawImage(img, 0, 0, c.width, c.height);
        try { resolve(c.toDataURL('image/png')); } catch (_) { resolve(null); }
      };
      img.onerror = () => resolve(null);
      img.src = url;
    } catch (_) { resolve(null); }
  });
}
// Platzhalter aus converters.js auflösen: Mermaid→PNG, [TOC]→Linkliste
async function prepareHtmlForWord(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // 1) TOC aus den Überschriften des erzeugten HTML aufbauen
  const tocSlots = doc.querySelectorAll('[data-toc]');
  if (tocSlots.length) {
    const hs = [...doc.querySelectorAll('h1,h2,h3,h4,h5,h6')];
    hs.forEach((h, i) => { if (!h.id) h.id = 'sk-h-' + i; });
    tocSlots.forEach(slot => {
      if (!hs.length) { slot.remove(); return; }
      let inner = '<p style="font-weight:bold">' + t('tocTitle') + '</p>';
      hs.forEach(h => {
        const lvl = +h.tagName[1];
        if (lvl > 3) return;
        const pad = (lvl - 1) * 18;
        inner += '<p style="margin:2pt 0 2pt ' + pad + 'pt"><a href="#' + h.id + '">' +
                 h.textContent + '</a></p>';
      });
      slot.innerHTML = inner;
    });
  }

  // 2) Mermaid-Blöcke zu PNG rendern (Fallback: vorhandener Code-Block bleibt)
  const mmd = [...doc.querySelectorAll('[data-mermaid]')];
  if (mmd.length) {
    const ok = await ensureMermaid();
    for (const box of mmd) {
      const code = decodeB64(box.getAttribute('data-mermaid'));
      box.removeAttribute('data-mermaid');
      if (!ok || !code.trim()) continue; // Code-Block bleibt als Fallback
      try {
        const res = await window.mermaid.render('mmd' + (mermaidSeq++), code);
        const png = await svgToPngDataUrl(res.svg);
        if (png) {
          box.innerHTML = '<img src="' + png + '" alt="Diagramm" style="max-width:100%">';
        }
      } catch (_) { /* Fallback: Code-Block bleibt erhalten */ }
    }
  }
  return doc.body.innerHTML;
}

/* ════════ Word-Aktionen ════════ */
function insertHtmlAtSelection(html) {
  return Word.run(async ctx => {
    ctx.document.getSelection().insertHtml(html, Word.InsertLocation.replace);
    await ctx.sync();
  });
}
async function getSelectionHtml() {
  let html = '';
  await Word.run(async ctx => {
    const r = ctx.document.getSelection().getHtml();
    await ctx.sync();
    html = r.value;
  });
  return html;
}
async function getBodyHtml() {
  let html = '';
  await Word.run(async ctx => {
    const r = ctx.document.body.getHtml();
    await ctx.sync();
    html = r.value;
  });
  return html;
}

/* ════════ UI-Verdrahtung ════════ */
const fileInput = document.getElementById('fileInput');

document.getElementById('btnImportFile').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  fileInput.value = '';
  if (!f) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      await insertHtmlAtSelection(await prepareHtmlForWord(mdToHtml(reader.result)));
      status(t('okImport') + f.name);
    } catch (e) { status(t('errOffice') + (e.message || e)); }
  };
  reader.onerror = () => status(t('errRead'));
  reader.readAsText(f);
});

document.getElementById('btnInsert').addEventListener('click', async () => {
  const src = document.getElementById('mdIn').value;
  if (!src.trim()) { status(t('errEmpty')); return; }
  try {
    await insertHtmlAtSelection(await prepareHtmlForWord(mdToHtml(src)));
    status(t('okInsert'));
  } catch (e) { status(t('errOffice') + (e.message || e)); }
});
document.getElementById('btnClearIn').addEventListener('click', () => {
  document.getElementById('mdIn').value = '';
});

document.getElementById('btnSelToMd').addEventListener('click', async () => {
  try {
    const html = await getSelectionHtml();
    const md = wordHtmlToMd(html);
    if (!md) { status(t('errSel')); return; }
    document.getElementById('mdOut').value = md;
    status(t('okExport'));
  } catch (e) { status(t('errOffice') + (e.message || e)); }
});
document.getElementById('btnDocToMd').addEventListener('click', async () => {
  try {
    const html = await getBodyHtml();
    document.getElementById('mdOut').value = wordHtmlToMd(html);
    status(t('okExport'));
  } catch (e) { status(t('errOffice') + (e.message || e)); }
});

document.getElementById('btnCopyOut').addEventListener('click', async () => {
  const out = document.getElementById('mdOut');
  if (!out.value) { status(t('errEmpty')); return; }
  try {
    await navigator.clipboard.writeText(out.value);
    status(t('okCopy'));
  } catch (_) {
    out.focus(); out.select();
    try { document.execCommand('copy'); status(t('okCopy')); }
    catch (__) { status(t('errCopy')); }
  }
});
document.getElementById('btnDownload').addEventListener('click', () => {
  const v = document.getElementById('mdOut').value;
  if (!v) { status(t('errEmpty')); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([v], { type: 'text/markdown' }));
  a.download = 'dokument.md';
  a.click();
  URL.revokeObjectURL(a.href);
});

Office.onReady(() => { applyLang(); });
applyLang();
</script>
</body>
</html>
