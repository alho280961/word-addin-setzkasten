<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setzkasten Markdown</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  :root {
    --ink: #26282b;
    --ink-soft: #303338;
    --line: #e3e5e8;
    --dim: #84898f;
    --accent: #61a60e;       /* ALHO-Gruen */
    --accent-deep: #4a7f0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: #fff;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 14px;
    background: var(--ink);
    color: #fff;
  }
  header .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  header .mark {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 4px;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
  }
  .lang { display: flex; border: 1px solid #4a4e54; border-radius: 6px; overflow: hidden; }
  .lang button {
    border: none; background: transparent; color: #aab0b7;
    font-size: 10px; font-weight: 700; letter-spacing: .04em;
    padding: 4px 7px; cursor: pointer;
  }
  .lang button.active { background: var(--accent); color: #fff; }

  main { padding: 14px; display: flex; flex-direction: column; gap: 18px; }
  section h2 {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--dim); margin-bottom: 8px;
  }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  button.action {
    appearance: none;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  button.action:hover { border-color: var(--accent); color: var(--accent-deep); }
  button.action.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.action.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  button.action:disabled { opacity: .5; cursor: default; }
  textarea {
    width: 100%;
    min-height: 110px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: Consolas, 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.55;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 11px; color: var(--dim); margin-top: 6px; line-height: 1.45; }
  #status {
    position: fixed;
    left: 14px; right: 14px; bottom: 12px;
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    border-left: 3px solid var(--accent);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  #status.show { opacity: 1; }
  input[type="file"] { display: none; }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="mark">M↓</span><span>Setzkasten</span></div>
  <div class="lang">
    <button data-lang="de" class="active">DE</button>
    <button data-lang="fr">FR</button>
    <button data-lang="en">EN</button>
  </div>
</header>

<main>
  <section>
    <h2 id="hImport">Markdown importieren</h2>
    <div class="row">
      <button class="action primary" id="btnImportFile"></button>
    </div>
    <p class="hint" id="hintImport"></p>
    <input type="file" id="fileInput" accept=".md,.markdown,.txt">
  </section>

  <section>
    <h2 id="hPaste"></h2>
    <textarea id="mdIn" spellcheck="false"></textarea>
    <div class="row" style="margin-top:8px">
      <button class="action primary" id="btnInsert"></button>
      <button class="action" id="btnClearIn"></button>
    </div>
    <p class="hint" id="hintPaste"></p>
  </section>

  <section>
    <h2 id="hExport"></h2>
    <div class="row">
      <button class="action" id="btnSelToMd"></button>
      <button class="action" id="btnDocToMd"></button>
    </div>
    <textarea id="mdOut" spellcheck="false" readonly style="margin-top:8px"></textarea>
    <div class="row" style="margin-top:8px">
      <button class="action primary" id="btnCopyOut"></button>
      <button class="action" id="btnDownload"></button>
    </div>
    <p class="hint" id="hintExport"></p>
  </section>
</main>

<div id="status"></div>

<script>
/* ════════ Mehrsprachigkeit ════════ */
const I18N = {
  de: {
    hImport: 'Markdown importieren', importFile: '.md-Datei einfügen …',
    hintImport: 'Wandelt die Datei in formatierten Word-Text um und fügt sie an der Cursorposition ein.',
    hPaste: 'Markdown einfügen (Copy & Paste)', insert: 'Formatiert einfügen', clear: 'Leeren',
    phIn: 'Markdown hier einfügen (Strg+V) …',
    hintPaste: 'Hinweis: Office erlaubt Add-ins kein Abfangen von Strg+V im Dokument — der Weg führt über dieses Feld.',
    hExport: 'Als Markdown exportieren', selToMd: 'Markierung → Markdown', docToMd: 'Ganzes Dokument → Markdown',
    copy: 'Kopieren', download: '.md herunterladen', phOut: 'Ergebnis erscheint hier …',
    hintExport: 'Markdown-fremde Word-Elemente (Spalten, Textfelder, Kommentare) entfallen beim Export.',
    okInsert: 'Eingefügt', okImport: 'Datei eingefügt: ', okCopy: 'Markdown kopiert',
    okExport: 'Konvertiert', errEmpty: 'Kein Markdown-Text vorhanden', errSel: 'Keine Markierung gefunden',
    errOffice: 'Word-Aktion fehlgeschlagen: ', errRead: 'Datei konnte nicht gelesen werden',
    errCopy: 'Kopieren fehlgeschlagen — Text bitte manuell markieren'
  },
  fr: {
    hImport: 'Importer du Markdown', importFile: 'Insérer un fichier .md …',
    hintImport: 'Convertit le fichier en texte Word mis en forme et l’insère à la position du curseur.',
    hPaste: 'Coller du Markdown', insert: 'Insérer mis en forme', clear: 'Effacer',
    phIn: 'Collez le Markdown ici (Ctrl+V) …',
    hintPaste: 'Remarque : Office n’autorise pas les compléments à intercepter Ctrl+V dans le document — passez par ce champ.',
    hExport: 'Exporter en Markdown', selToMd: 'Sélection → Markdown', docToMd: 'Document entier → Markdown',
    copy: 'Copier', download: 'Télécharger .md', phOut: 'Le résultat apparaît ici …',
    hintExport: 'Les éléments Word sans équivalent Markdown (colonnes, zones de texte, commentaires) sont omis.',
    okInsert: 'Inséré', okImport: 'Fichier inséré : ', okCopy: 'Markdown copié',
    okExport: 'Converti', errEmpty: 'Aucun texte Markdown', errSel: 'Aucune sélection trouvée',
    errOffice: 'Échec de l’action Word : ', errRead: 'Impossible de lire le fichier',
    errCopy: 'Échec de la copie — veuillez sélectionner le texte manuellement'
  },
  en: {
    hImport: 'Import Markdown', importFile: 'Insert .md file …',
    hintImport: 'Converts the file to formatted Word text and inserts it at the cursor position.',
    hPaste: 'Paste Markdown', insert: 'Insert formatted', clear: 'Clear',
    phIn: 'Paste Markdown here (Ctrl+V) …',
    hintPaste: 'Note: Office does not let add-ins intercept Ctrl+V in the document — use this field instead.',
    hExport: 'Export as Markdown', selToMd: 'Selection → Markdown', docToMd: 'Whole document → Markdown',
    copy: 'Copy', download: 'Download .md', phOut: 'Result appears here …',
    hintExport: 'Word elements with no Markdown equivalent (columns, text boxes, comments) are omitted on export.',
    okInsert: 'Inserted', okImport: 'File inserted: ', okCopy: 'Markdown copied',
    okExport: 'Converted', errEmpty: 'No Markdown text', errSel: 'No selection found',
    errOffice: 'Word action failed: ', errRead: 'Could not read the file',
    errCopy: 'Copy failed — please select the text manually'
  }
};
let lang = (navigator.language || 'de').slice(0, 2);
if (!I18N[lang]) lang = 'de';
const t = k => I18N[lang][k];

function applyLang() {
  const d = I18N[lang];
  document.documentElement.lang = lang;
  document.getElementById('hImport').textContent = d.hImport;
  document.getElementById('btnImportFile').textContent = d.importFile;
  document.getElementById('hintImport').textContent = d.hintImport;
  document.getElementById('hPaste').textContent = d.hPaste;
  document.getElementById('btnInsert').textContent = d.insert;
  document.getElementById('btnClearIn').textContent = d.clear;
  document.getElementById('mdIn').placeholder = d.phIn;
  document.getElementById('hintPaste').textContent = d.hintPaste;
  document.getElementById('hExport').textContent = d.hExport;
  document.getElementById('btnSelToMd').textContent = d.selToMd;
  document.getElementById('btnDocToMd').textContent = d.docToMd;
  document.getElementById('btnCopyOut').textContent = d.copy;
  document.getElementById('btnDownload').textContent = d.download;
  document.getElementById('mdOut').placeholder = d.phOut;
  document.getElementById('hintExport').textContent = d.hintExport;
  document.querySelectorAll('.lang button').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang));
}
document.querySelectorAll('.lang button').forEach(b =>
  b.addEventListener('click', () => { lang = b.dataset.lang; applyLang(); }));

function status(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(status._t);
  status._t = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ════════ Markdown → HTML (portiert aus dem Setzkasten) ════════ */
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function mdInline(s) {
  s = escapeHtml(s);
  s = s.replace(/&lt;span style=&quot;color:\s*(#[0-9a-fA-F]{3,8}|[a-zA-Z]{3,20})&quot;&gt;([\s\S]*?)&lt;\/span&gt;/g,
    '<span style="color:$1">$2</span>');
  s = s.replace(/`([^`]+)`/g, '<code style="font-family:Consolas,monospace;background:#f0f1f2">$1</code>');
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, '<img src="$2" alt="$1">');
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
  s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
  return s;
}
function mdToHtml(src) {
  const lines = src.replace(/\r\n/g, '\n').split('\n');
  let html = '', i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^```/.test(line)) {
      let buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])) { buf.push(lines[i]); i++; }
      i++;
      html += '<pre style="font-family:Consolas,monospace;background:#f0f1f2;padding:8pt">' +
              escapeHtml(buf.join('\n')) + '</pre>';
      continue;
    }
    const h = line.match(/^(#{1,6})\s+(.*)/);
    if (h) { const l = h[1].length; html += `<h${l}>${mdInline(h[2])}</h${l}>`; i++; continue; }
    if (/^(\s*)(---+|\*\*\*+|___+)\s*$/.test(line)) { html += '<hr>'; i++; continue; }
    if (/^>\s?/.test(line)) {
      let buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, '')); i++; }
      html += '<blockquote style="border-left:3pt solid #61a60e;padding-left:10pt;color:#555">' +
              mdToHtml(buf.join('\n')) + '</blockquote>';
      continue;
    }
    if (/\|/.test(line) && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(lines[i + 1])) {
      const cells = r => r.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
      const head = cells(line); i += 2;
      let rows = [];
      while (i < lines.length && /\|/.test(lines[i])) { rows.push(cells(lines[i])); i++; }
      html += '<table border="1" style="border-collapse:collapse"><thead><tr>' +
        head.map(c => '<th style="padding:4pt 8pt">' + mdInline(c) + '</th>').join('') + '</tr></thead><tbody>';
      rows.forEach(r => { html += '<tr>' + r.map(c => '<td style="padding:4pt 8pt">' + mdInline(c) + '</td>').join('') + '</tr>'; });
      html += '</tbody></table>';
      continue;
    }
    const ulM = /^(\s*)[-*+]\s+(.*)/, olM = /^(\s*)\d+\.\s+(.*)/;
    if (ulM.test(line) || olM.test(line)) {
      const ordered = olM.test(line);
      const re = ordered ? olM : ulM, tag = ordered ? 'ol' : 'ul';
      html += `<${tag}>`;
      while (i < lines.length && re.test(lines[i])) {
        let item = lines[i].match(re)[2];
        // Checkboxen: Word kennt keine HTML-Inputs -> Unicode-Symbole
        const task = !ordered && item.match(/^\[( |x|X)\]\s+(.*)$/);
        if (task) item = (task[1].toLowerCase() === 'x' ? '☑ ' : '☐ ') + task[2];
        html += '<li>' + mdInline(item) + '</li>';
        i++;
      }
      html += `</${tag}>`;
      continue;
    }
    if (line.trim() === '') { i++; continue; }
    let buf = [line]; i++;
    while (i < lines.length && lines[i].trim() !== '' &&
           !/^(#{1,6}\s|>|```|[-*+]\s|\d+\.\s|---|\*\*\*)/.test(lines[i])) { buf.push(lines[i]); i++; }
    html += '<p>' + mdInline(buf.join(' ')) + '</p>';
  }
  return html;
}

/* ════════ Word-HTML → Markdown ════════ */
function styleOf(el) {
  return (el.getAttribute && el.getAttribute('style')) || '';
}
function isBoldEl(el) {
  const s = styleOf(el);
  return el.tagName === 'B' || el.tagName === 'STRONG' ||
         /font-weight:\s*(bold|[6-9]00)/i.test(s);
}
function isItalicEl(el) {
  return el.tagName === 'I' || el.tagName === 'EM' || /font-style:\s*italic/i.test(styleOf(el));
}
function isStrikeEl(el) {
  return el.tagName === 'S' || el.tagName === 'DEL' || el.tagName === 'STRIKE' ||
         /text-decoration[^;]*line-through/i.test(styleOf(el));
}
function inlineToMd(el) {
  let out = '';
  for (const n of el.childNodes) {
    if (n.nodeType === Node.TEXT_NODE) { out += n.nodeValue.replace(/\u00a0/g, ' '); continue; }
    if (n.nodeType !== Node.ELEMENT_NODE) continue;
    const tag = n.tagName;
    if (tag === 'O:P' || tag === 'STYLE' || tag === 'META') continue;
    const inner = () => inlineToMd(n);
    if (tag === 'BR') { out += '\n'; continue; }
    if (tag === 'CODE') { out += '`' + n.textContent + '`'; continue; }
    if (tag === 'A') {
      const href = n.getAttribute('href') || '';
      const txt = inner().trim();
      out += txt ? '[' + txt + '](' + href + ')' : '';
      continue;
    }
    if (tag === 'IMG') {
      out += '![' + (n.getAttribute('alt') || '') + '](' + (n.getAttribute('src') || '') + ')';
      continue;
    }
    let body = inner();
    if (!body.trim()) { out += body; continue; }
    if (isStrikeEl(n)) body = '~~' + body.trim() + '~~';
    if (isItalicEl(n)) body = '*' + body.trim() + '*';
    if (isBoldEl(n)) body = '**' + body.trim() + '**';
    out += body;
  }
  return out;
}
function blockToMd(node) {
  if (node.nodeType === Node.TEXT_NODE) {
    const tx = node.nodeValue.trim();
    return tx ? tx + '\n\n' : '';
  }
  if (node.nodeType !== Node.ELEMENT_NODE) return '';
  const tag = node.tagName;
  if (tag === 'STYLE' || tag === 'META' || tag === 'O:P') return '';
  const h = tag.match(/^H([1-6])$/);
  if (h) return '#'.repeat(+h[1]) + ' ' + inlineToMd(node).trim() + '\n\n';
  switch (tag) {
    case 'P': case 'DIV': {
      const cls = (node.getAttribute('class') || '');
      const sty = styleOf(node);
      const txt = inlineToMd(node).replace(/\s+/g, ' ').trim();
      if (!txt) return '';
      // Word-Listenabsätze (Desktop-HTML hat oft kein <ul>)
      if (/MsoListParagraph/i.test(cls) || /mso-list/i.test(sty)) {
        const cleaned = txt.replace(/^[•·▪o\-\u2022]\s*/, '');
        const num = txt.match(/^(\d+)[.)]\s+(.*)$/);
        return num ? num[1] + '. ' + num[2] + '\n' : '- ' + cleaned + '\n';
      }
      // Checkbox-Symbole zurückwandeln
      const cb = txt.match(/^([☐☑✓])\s*(.*)$/);
      if (cb) return '- [' + (cb[1] === '☐' ? ' ' : 'x') + '] ' + cb[2] + '\n';
      return txt + '\n\n';
    }
    case 'BLOCKQUOTE': {
      let inner = '';
      for (const c of node.childNodes) inner += blockToMd(c);
      return inner.trim().split('\n').map(l => '> ' + l).join('\n') + '\n\n';
    }
    case 'UL': case 'OL': {
      let out = '', idx = 1;
      for (const li of node.children) {
        if (li.tagName !== 'LI') continue;
        const txt = inlineToMd(li).replace(/\s+/g, ' ').trim();
        const cb = txt.match(/^([☐☑✓])\s*(.*)$/);
        if (tag === 'OL') out += (idx++) + '. ' + txt + '\n';
        else if (cb) out += '- [' + (cb[1] === '☐' ? ' ' : 'x') + '] ' + cb[2] + '\n';
        else out += '- ' + txt + '\n';
      }
      return out + '\n';
    }
    case 'PRE': return '```\n' + node.textContent.replace(/\n$/, '') + '\n```\n\n';
    case 'HR': return '---\n\n';
    case 'TABLE': {
      const rows = [...node.querySelectorAll('tr')];
      if (!rows.length) return '';
      const cells = tr => [...tr.children].map(td =>
        inlineToMd(td).replace(/\s+/g, ' ').trim().replace(/\|/g, '\\|'));
      const head = cells(rows[0]);
      let out = '| ' + head.join(' | ') + ' |\n';
      out += '| ' + head.map(() => '---').join(' | ') + ' |\n';
      for (const tr of rows.slice(1)) out += '| ' + cells(tr).join(' | ') + ' |\n';
      return out + '\n';
    }
    default: {
      let out = '';
      let hasBlocks = false;
      for (const c of node.childNodes) {
        if (c.nodeType === Node.ELEMENT_NODE &&
            /^(P|DIV|H[1-6]|UL|OL|TABLE|BLOCKQUOTE|PRE|HR)$/.test(c.tagName)) { hasBlocks = true; break; }
      }
      if (hasBlocks) { for (const c of node.childNodes) out += blockToMd(c); return out; }
      const txt = inlineToMd(node).replace(/\s+/g, ' ').trim();
      return txt ? txt + '\n\n' : '';
    }
  }
}
function wordHtmlToMd(htmlStr) {
  const doc = new DOMParser().parseFromString(htmlStr, 'text/html');
  let out = '';
  for (const n of doc.body.childNodes) out += blockToMd(n);
  return out.replace(/\n{3,}/g, '\n\n').trim();
}

/* ════════ Word-Aktionen ════════ */
function insertHtmlAtSelection(html) {
  return Word.run(async ctx => {
    ctx.document.getSelection().insertHtml(html, Word.InsertLocation.replace);
    await ctx.sync();
  });
}
async function getSelectionHtml() {
  let html = '';
  await Word.run(async ctx => {
    const r = ctx.document.getSelection().getHtml();
    await ctx.sync();
    html = r.value;
  });
  return html;
}
async function getBodyHtml() {
  let html = '';
  await Word.run(async ctx => {
    const r = ctx.document.body.getHtml();
    await ctx.sync();
    html = r.value;
  });
  return html;
}

/* ════════ UI-Verdrahtung ════════ */
const fileInput = document.getElementById('fileInput');

document.getElementById('btnImportFile').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  fileInput.value = '';
  if (!f) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      await insertHtmlAtSelection(mdToHtml(reader.result));
      status(t('okImport') + f.name);
    } catch (e) { status(t('errOffice') + (e.message || e)); }
  };
  reader.onerror = () => status(t('errRead'));
  reader.readAsText(f);
});

document.getElementById('btnInsert').addEventListener('click', async () => {
  const src = document.getElementById('mdIn').value;
  if (!src.trim()) { status(t('errEmpty')); return; }
  try {
    await insertHtmlAtSelection(mdToHtml(src));
    status(t('okInsert'));
  } catch (e) { status(t('errOffice') + (e.message || e)); }
});
document.getElementById('btnClearIn').addEventListener('click', () => {
  document.getElementById('mdIn').value = '';
});

document.getElementById('btnSelToMd').addEventListener('click', async () => {
  try {
    const html = await getSelectionHtml();
    const md = wordHtmlToMd(html);
    if (!md) { status(t('errSel')); return; }
    document.getElementById('mdOut').value = md;
    status(t('okExport'));
  } catch (e) { status(t('errOffice') + (e.message || e)); }
});
document.getElementById('btnDocToMd').addEventListener('click', async () => {
  try {
    const html = await getBodyHtml();
    document.getElementById('mdOut').value = wordHtmlToMd(html);
    status(t('okExport'));
  } catch (e) { status(t('errOffice') + (e.message || e)); }
});

document.getElementById('btnCopyOut').addEventListener('click', async () => {
  const out = document.getElementById('mdOut');
  if (!out.value) { status(t('errEmpty')); return; }
  try {
    await navigator.clipboard.writeText(out.value);
    status(t('okCopy'));
  } catch (_) {
    out.focus(); out.select();
    try { document.execCommand('copy'); status(t('okCopy')); }
    catch (__) { status(t('errCopy')); }
  }
});
document.getElementById('btnDownload').addEventListener('click', () => {
  const v = document.getElementById('mdOut').value;
  if (!v) { status(t('errEmpty')); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([v], { type: 'text/markdown' }));
  a.download = 'dokument.md';
  a.click();
  URL.revokeObjectURL(a.href);
});

Office.onReady(() => { applyLang(); });
applyLang();
</script>
</body>
</html>
